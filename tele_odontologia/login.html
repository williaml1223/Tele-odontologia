<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión | DentalApp Pro</title>
    <link rel="stylesheet" href="tele-style.css">
    <style>
        .login-card { max-width: 400px; margin: 80px auto; padding: 40px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #475569; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="container" style="text-align: center;">
        <div class="glass-card login-card">
            <h2 style="margin-bottom: 10px;">Bienvenido de nuevo</h2>
            <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 30px;">Ingresa para revisar tu caso.</p>

            <form onsubmit="iniciarSesion(event)">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-pass" required>
                </div>
                <button type="submit" class="btn-tele" style="width: 100%;">Entrar al Panel</button>
            </form>
            <p style="margin-top: 20px; font-size: 0.85rem;">¿No tienes cuenta? <a href="registro.html" style="color: #0070f3; font-weight: bold; text-decoration: none;">Regístrate aquí</a></p>
        </div>
    </div>
    <script>
        function iniciarSesion(e) {
            e.preventDefault();
            // Aquí iría la validación real. Por ahora, redirigimos al dashboard.
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
